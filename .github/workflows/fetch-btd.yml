name: Fetch BTD — Balancing Stack (S2)

on:
  schedule:
    - cron: '30 5 * * *'  # 05:30 UTC — 30 min before S1/S4 cron at 06:00 UTC
  workflow_dispatch:

# Required GitHub secrets:
# UPDATE_SECRET — must match `wrangler secret put UPDATE_SECRET`
# (no other secrets needed — BTD API is public)

jobs:
  fetch-btd:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch BTD → compute S2 → push to KV
        env:
          UPDATE_SECRET: ${{ secrets.UPDATE_SECRET }}
        run: |
          node << 'SCRIPT'

          const WORKER = 'https://kkme-fetch-s1.kastis-kemezys.workers.dev';
          const BTD    = 'https://api-baltic.transparency-dashboard.eu/api/v1/export';
          const SECRET = process.env.UPDATE_SECRET;

          if (!SECRET) {
            console.error('UPDATE_SECRET not set — aborting');
            process.exit(1);
          }

          // ── Date helpers ──────────────────────────────────────────────────────

          function btdDate(d) {
            return d.toISOString().slice(0, 10) + 'T00:00';
          }

          const now  = new Date();
          const yd   = new Date(now); yd.setUTCDate(now.getUTCDate() - 1);
          const w7   = new Date(now); w7.setUTCDate(now.getUTCDate() - 7);

          const BTD_HEADERS = {
            'Accept':          'application/json',
            'Accept-Language': 'en-US,en;q=0.9',
            'User-Agent':      'Mozilla/5.0 (compatible; KKME-Pipeline/1.0; +https://kkme.eu)',
          };

          // ── Fetch one BTD endpoint (30s timeout, never throws) ────────────────

          async function btdFetch(id, from, to) {
            const params = new URLSearchParams({
              id,
              start_date:         btdDate(from),
              end_date:           btdDate(to),
              output_time_zone:   'UTC',
              output_format:      'json',
              json_header_groups: '1',
            });
            const url = `${BTD}?${params}`;
            console.log(`→ ${url}`);

            // AbortController — 8s: BTD blocks GH Actions IPs via TCP drop; fail fast
            const ac    = new AbortController();
            const timer = setTimeout(() => ac.abort(), 8000);
            try {
              const res = await fetch(url, { headers: BTD_HEADERS, signal: ac.signal });
              clearTimeout(timer);
              console.log(`  HTTP ${res.status}  content-type: ${res.headers.get('content-type')}`);
              if (!res.ok) {
                const text = await res.text();
                console.error(`  Error body: ${text.slice(0, 1000)}`);
                return null;
              }
              const ct = res.headers.get('content-type') || '';
              if (!ct.includes('json')) {
                const text = await res.text();
                console.error(`  Not JSON — body preview: ${text.slice(0, 1000)}`);
                return null;
              }
              const json = await res.json();
              // Log structure so we can tune column patterns after first real response
              if (Array.isArray(json)) {
                console.log(`  Format: array[${json.length}], sample keys: ${Object.keys(json[0] || {}).slice(0, 10).join(' | ')}`);
              } else {
                console.log(`  Format: object, top-level keys: ${Object.keys(json).slice(0, 10).join(' | ')}`);
                if (json.headers) console.log(`  headers[0..5]: ${json.headers.slice(0, 6).join(' | ')}`);
                if (json.columns) console.log(`  columns[0..5]: ${JSON.stringify(json.columns.slice(0, 6))}`);
              }
              return json;
            } catch (e) {
              clearTimeout(timer);
              console.error(`  Fetch error (${id}): ${e.message}`);
              return null;
            }
          }

          // ── Main ──────────────────────────────────────────────────────────────

          async function main() {
            console.log(`Dates: yesterday=${btdDate(yd)}  7d_ago=${btdDate(w7)}  now=${btdDate(now)}`);

            // Fetch all 3 endpoints; use allSettled so one timeout doesn't abort all
            const results = await Promise.allSettled([
              btdFetch('price_procured_reserves',   yd, now),
              btdFetch('direction_of_balancing_v2', yd, now),
              btdFetch('imbalance_prices',          w7, now),
            ]);
            const capRaw = results[0].status === 'fulfilled' ? results[0].value : null;
            const dirRaw = results[1].status === 'fulfilled' ? results[1].value : null;
            const imbRaw = results[2].status === 'fulfilled' ? results[2].value : null;

            if (!capRaw && !dirRaw && !imbRaw) {
              console.warn('All 3 BTD endpoints failed — BTD blocks GitHub Actions IPs (expected).');
              console.warn('Mac residential cron (fetch-btd.js) is the active S2 pipeline.');
              console.log('::notice::BTD unreachable from GH Actions — no KV update. Mac cron handles S2.');
              process.exit(0);
            }

            // Send raw BTD data — Worker's s2ShapePayload() does the computation.
            // (Pre-computing metrics here and sending them was the wrong format.)
            const payload = {
              reserves:  capRaw,
              direction: dirRaw,
              imbalance: imbRaw,
            };

            console.log('\nPayload keys: reserves=' + (capRaw ? 'present' : 'null') +
              ' direction=' + (dirRaw ? 'present' : 'null') +
              ' imbalance=' + (imbRaw ? 'present' : 'null'));

            // Push to Worker — fail the workflow if this step fails
            const pushRes = await fetch(`${WORKER}/s2/update`, {
              method:  'POST',
              headers: {
                'Content-Type':    'application/json',
                'X-Update-Secret': SECRET,
              },
              body: JSON.stringify(payload),
            });

            if (!pushRes.ok) {
              const body = await pushRes.text();
              console.error(`Worker push failed: HTTP ${pushRes.status} — ${body}`);
              process.exit(1);
            }
            console.log('✓ S2 pushed to KV successfully');
          }

          main().catch(e => { console.error(e); process.exit(1); });

          SCRIPT
